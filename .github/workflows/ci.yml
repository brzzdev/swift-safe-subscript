name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test on macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
